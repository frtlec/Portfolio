version: "3.8"

services:
  workitemsdb:
    container_name: workitemsdb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - workitemsdb_volume:/var/lib/postgresql/data2
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=zk147olu
      - POSTGRES_DB=workitemsdb
  portfolio_rabbitmq:
    container_name: portfolio_rabbitmq
    restart: always
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
  maildb:
    container_name: maildb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - maildb_volume:/data/db
  settingdb:
    container_name: settingdb
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - settingdb_volume:/data/db
  identity4db:
    container_name: identity4db
    user: root
    restart: always
    ports:
      - "1433:1433"
    expose:
      - 1433
    volumes:
      - identity4db_volume:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=zk147olu
  photostock.api:
    container_name: photostock.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServerURL=http://identityserver.api
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19055
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/dev_cert.pfx
    ports:
      - "5104:80"
      - "19055:443"
    restart: on-failure
    volumes:
      - type: bind
        source: /root/opt/app_data/portfolio_photostock_data
        # source: C:\Users\zafer\Desktop\photos
        target: /app/wwwroot/photos
      - type: bind
        source: /root/opt/app_data/portfolio_photostock_data
        # source: C:\Users\zafer\Desktop\photos
        target: /app/wwwroot/svg
      - ~/.aspnet/https:/https:ro
  mailsender.api:
    container_name: mailsender.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMQUrl=portfolio_rabbitmq
      - IdentityServerURL=http://identityserver.api
      - DatabaseSettings:ConnectionString=mongodb://maildb:27017
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19054
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/dev_cert.pfx
    restart: on-failure
    ports:
      - "5103:80"
      - "19054:443"
    depends_on:
      - maildb
    volumes:
      - ~/.aspnet/https:/https:ro
  setting.api:
    container_name: setting.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - IdentityServerURL=http://identityserver.api
      - DatabaseSettings:ConnectionString=mongodb://settingdb
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19052
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    restart: on-failure
    ports:
      - "5105:80"
      - "19052:443"
    volumes:
      - ${HOME}/.aspnet/https:/https:ro
      # - ${HOME}/.aspnet/https:/https:ro
      # - ${HOME}/.aspnet/https:/https/dev_cert.pfx:ro
    depends_on:
      - settingdb
  workitem.api:
    container_name: workitem.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - IdentityServerURL=http://identityserver.api
      - "ConnectionStrings:PostgreSql=User ID=admin; Password=zk147olu; Server=workitemsdb; Port=5432;Database=workitemsdb;Integrated Security=true;Pooling=true"
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19053
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/dev_cert.pfx
    ports:
      - "5102:80"
      - "19053:443"
    volumes:
      - ./https/aspnetapp.pfx:/https/dev_cert.pfx:ro
    restart: on-failure
    depends_on:
      - workitemsdb
  identityserver.api:
    container_name: identityserver.api
    restart: on-failure
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "ConnectionStrings:DefaultConnection=Server=identity4db,1433;Database=Identity4DbDeploy;User=sa;Password=zk147olu"
      - TokenOptions:IssuerUri=http://identityserver.api
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19051
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/dev_cert.pfx
    ports:
      - "5101:80"
      - "19051:443"
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      - identity4db
  gateway.api:
    container_name: gateway.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - IdentityServerURL=http://identityserver.api
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_HTTPS_PORT=19050
      - ASPNETCORE_Kestrel__Certificates__Default__Password=zk147olu
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/dev_cert.pfx
    restart: on-failure
    ports:
      - "5100:80"
      - "19050:443"
    volumes:
      - ~/.aspnet/https:/https:ro
  selinozoglu.webui:
    container_name: selinozoglu.webui
    restart: on-failure
    ports:
      - "5110:80"
      - "9392:443"
    depends_on:
      - identityserver.api
      - mailsender.api
      - workitem.api
      - photostock.api

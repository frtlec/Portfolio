version: "3.8"
services:
  workitemsdb:
    container_name: workitemsdb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - workitemsdb_volume:/var/lib/postgresql/data2
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=zk147olu
      - POSTGRES_DB=workitemsdb
  portfolio_rabbitmq:
    container_name: portfolio_rabbitmq
    restart: always
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
  maildb:
    container_name: maildb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - maildb_volume:/data/db
  identity4db:
    container_name: identity4db
    user: root
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - identity4db_volume:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=zk147olu

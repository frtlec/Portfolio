events{}
http {
    include /etc/nginx/mime.types;
    server {
        listen 80;
        listen 443;
        server_name www.selinozoglu.com selinozoglu.com;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
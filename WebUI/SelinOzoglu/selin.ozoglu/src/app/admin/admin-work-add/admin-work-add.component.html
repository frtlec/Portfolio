<meta http-equiv="cache-control" content="no-cache, must-revalidate, post-check=0, pre-check=0">
<meta http-equiv="expires" content="0">
<meta http-equiv="pragma" content="no-cache">
<form #workAddForm="ngForm" (ngSubmit)="submit()">
    <ng-template #content let-modal>
     
        <div class="modal-body p-0">
            <img [src]="detailPictureSRC" width="100%" />
        </div>
    </ng-template>
    <div class="container-fuild">
        <div class="row">
            <div class="col-md-3 mt-4 m-auto bg-soft p-4">
                <h4>İş Bilgileri</h4>
                <hr />
                <div class="form-group mt-3">
                    <label for="exampleInputEmail1">İş Adı</label>
                    <input [(ngModel)]="title" name="title" type="text" class="form-control" id="exampleInputEmail1"
                        aria-describedby="emailHelp" placeholder="İş Başlığı giriniz">
                </div>
                <div class="form-group mt-3">
                    <label for="exampleInputEmail1">Alt Metin</label>
                    <textarea class="form-control" [(ngModel)]="description" name="description">

                    </textarea>
                </div>
                <div class="form-group mt-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" [(ngModel)]="isActive" name="isActive" [checked]="isActive" />
                        <label class="form-check-label" for="exampleCheck1"> Aktif</label>
                      </div>
     
                </div>
                <div class="form-group mt-3">
                    <select class="form-control" [(ngModel)]="categoryID" name="categoryID"  >
                        <option   [selected]="true" [value]="0">Kategori Seçimi</option>
                        <option *ngFor="let cat of categories"  [value]="cat.id" [attr.data-active]="cat.isActive">{{cat.title}}</option>
                    </select>
                </div>
                <div class="form-group mt-3">
                    <label class="mb-1 text-muted">Ana Fotoğraf</label>
                    <input #mainPhotoInput type="file" class="form-control" (change)="mainPhotoChange($event)"
                        placeholder="Upload file">
                    <input  type="hidden" name="mainPicture" [(ngModel)]="mainPicture" />
                    <small class="text-muted d-block text-right">
                        sadece kare fotoğraf önerilen boyutlar (1080x1080)
                    </small>

                    <div class="square border p-4 bg-dark">
                        <img *ngIf="mainPicture!=''" [src]="mainPictureSRC" width="100%" />
                        <fa-icon *ngIf="mainPicture==''" [icon]="faImage" style="font-size: 8rem;color:#c3c3c3">
                        </fa-icon>
                    </div>

                </div>
                <div class="tools p-2">
                    <button type="submit" title="çalışmayı kaydet" class="btn btn-hover">
                        <fa-icon [icon]="faSave" class="text-success tool"></fa-icon>
                    </button>
                    <hr/>
                    <button type="button" title="çalışmayı temizle" (click)="clearForm()" class="btn btn-hover">
                        <fa-icon [icon]="faTrash" class="text-primary tool"></fa-icon>
                    </button>
                </div>

            </div>
            <div class="col-md-9 mt-4 m-auto p-4">
                <h4>Detay Sayfası</h4>
                <hr />
                <div class="row">
                    <div class="col-md-5 mb-3">
                        <div class="form-group">
                            <label class="mb-1 text-muted">Detay Fotoğraf</label>
                            <input #detailPhotoInput type="file" class="form-control" (change)="detailPhotoChange($event)"
                                placeholder="Upload file">
                            <input type="hidden" name="fullPhoto" [(ngModel)]="detailPicture" />
                        </div>
                    </div>

                    <div class="col-md-12">

                        <div class="rectangle border p-4 bg-dark "  (click)="open(content)">
                            <img *ngIf="detailPicture!=undefined" [src]="detailPictureSRC" width="100%" />
                            <fa-icon *ngIf="detailPicture==undefined" [icon]="faImage"
                                style="font-size: 8rem;color:#c3c3c3"></fa-icon>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <angular-editor [placeholder]="'Alt Metin girin...'" [config]="editorConfig" [(ngModel)]="workItem.description"
                            name="workItem.description"></angular-editor>
                    </div>
                </div>


            </div>
        </div>

    </div>
</form>

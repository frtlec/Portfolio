name: Build and Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: identityserver
            dockerfile: IdentityServer/Portfolio.IdentityServer/Dockerfile
          - name: photostock
            dockerfile: Services/PhotoStock/Portfolio.Services.PhotoStock/Dockerfile
          - name: mailsender
            dockerfile: MailSender/Portfolio.Services.MailSender/Dockerfile
          - name: workitem
            dockerfile: Services/WorkItems/Portfolio.Services.WorkItems.API/Dockerfile
          - name: setting
            dockerfile: Services/Setting/Porfolio.Services.Setting.API/Dockerfile
          - name: selinozoglu-webui
            dockerfile: WebUI/SelinOzoglu/selin.ozoglu/Dockerfile
          - name: gateway
            dockerfile: Gateway/Portfolio.Gateway/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/portfolio-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sunucu artik sadece compose dosyalarina ihtiyac duyar (image'lar
      # onceden build edilip ghcr.io'ya push edildi, sunucuda build YOK).
      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,docker-compose.override.yml"
          target: "/opt/Portfolio"

      - name: Pull images and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/Portfolio
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f
